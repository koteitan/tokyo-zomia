<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>東京ゾミア</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="c"></canvas>
<div id="info">
  <a href="https://github.com/koteitan/tokyo-zomia" target="_blank" style="color:#8cf;text-decoration:none">東京ゾミア</a><br>
  <kbd>ドラッグ</kbd> 回転 <kbd>ホイール</kbd> ズーム <kbd>右ドラッグ</kbd> パン
</div>
<div id="controls">
  <label>標高スケール: <input type="range" id="elevScale" min="1" max="50" value="10"> <span id="elevScaleVal">10</span>x</label>
  <label><input type="checkbox" id="showNodes" checked> 端点表示</label>
  <label><input type="checkbox" id="showCoast" checked> 海岸線表示</label>
</div>
<div id="tooltip"></div>
<script src="index.js"></script>
</body>
</html>
